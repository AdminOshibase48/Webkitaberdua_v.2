<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Offline - Couple Love</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #FFF0F6 0%, #F3ECFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .offline-container {
            text-align: center;
            max-width: 400px;
            animation: fadeIn 0.5s ease;
        }
        
        .icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #FF6B9D, #FFA8C8);
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            box-shadow: 0 20px 40px rgba(255, 107, 157, 0.3);
        }
        
        .icon svg {
            width: 60px;
            height: 60px;
            color: white;
        }
        
        h1 {
            font-size: 1.8rem;
            color: #FF6B9D;
            margin-bottom: 12px;
        }
        
        p {
            color: #6B7280;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .retry-btn {
            background: linear-gradient(135deg, #FF6B9D, #FFA8C8);
            border: none;
            padding: 14px 32px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        
        .retry-btn:hover {
            transform: translateY(-2px);
        }
        
        .hearts {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        
        .hearts span {
            font-size: 1.5rem;
            animation: heartbeat 1.5s infinite;
        }
        
        .hearts span:nth-child(2) { animation-delay: 0.2s; }
        .hearts span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 12V8H6V20H18V12H20Z" />
                <path d="M12 8V4" />
                <path d="M8 4H16" />
                <path d="M12 16V12" />
                <path d="M15 19L12 16L9 19" />
            </svg>
        </div>
        <h1>You're Offline 💔</h1>
        <p>Sayang, koneksi internetmu terputus nih...<br>
        Tapi jangan khawatir, aku akan menunggumu kembali!<br>
        Coba refresh halaman ini saat kamu sudah online ya.</p>
        <button class="retry-btn" onclick="window.location.reload()">
            🔄 Try Again
        </button>
        <div class="hearts">
            <span>❤️</span>
            <span>❤️</span>
            <span>❤️</span>
        </div>
    </div>
</body>
</html>
