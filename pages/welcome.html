<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome - OurStory</title>
    
    <meta name="theme-color" content="#874e58">
    <link rel="manifest" href="/manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <link href="../assets/css/tailwind.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
    
    <style>
        .accent-gradient {
            background: linear-gradient(135deg, #874e58 0%, #645495 50%, #316385 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        .heart-particle {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            animation: rise 8s linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
        body {
            background-color: #fbf9f5;
            overflow-x: hidden;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex flex-col bg-surface">
        <!-- Header - Logo -->
        <header class="pt-8 px-4 flex justify-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-full accent-gradient flex items-center justify-center shadow-lg">
                    <span class="material-symbols-outlined text-white filled">favorite</span>
                </div>
                <span class="font-headline-md text-headline-md text-primary tracking-tight" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 24px; font-weight: 600;">OurStory</span>
            </div>
        </header>

        <!-- Main Content - Flex 1 untuk push footer ke bawah -->
        <main class="flex-1 flex items-center justify-center px-4 py-8">
            <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-12 gap-8 items-center">
                <!-- Illustration Column -->
                <div class="lg:col-span-7 flex justify-center">
                    <div class="relative w-full max-w-md floating">
                        <div class="aspect-square rounded-xl overflow-hidden shadow-[0_32px_64px_rgba(135,78,88,0.12)] border-[8px] border-white">
                            <img class="w-full h-full object-cover" alt="Couple illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqqh8ay1b5zbNQ4x0RZRkfl1qXIyyBGrtqxwZycGZofQIjJR7hUYwOYgSp-zqjtwOCmKihn9OWp-DQOw0revU2LpIhzQTLoQCO3t05hKzD-0MlQcZ3emvnWbzIQRfyUn7t9XmB58KAkYHhckoyD04R_AGq-mJ_gryicqrKIcmmMzk6yiaND89drrKWzsBYMMvHZ47oHgWoffz-4hJSvCnSOeHIokcLsW9TjvyfRvv0EXUnRnJuIxoIvQEIUNylVsET_BBXA23ohF4" />
                        </div>
                        <!-- Floating Stats Card -->
                        <div class="absolute -top-6 -right-6 glass-card p-4 rounded-lg shadow-xl">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
                                    <span class="material-symbols-outlined text-on-secondary-container text-sm filled">auto_awesome</span>
                                </div>
                                <div>
                                    <p class="text-label-sm font-label-sm text-on-surface-variant">New Memory</p>
                                    <p class="text-label-md font-bold text-secondary">Paris Trip '24</p>
                                </div>
                            </div>
                        </div>
                        <!-- Floating Users Card -->
                        <div class="absolute -bottom-4 -left-8 glass-card p-4 rounded-lg shadow-xl">
                            <div class="flex items-center gap-3">
                                <div class="flex -space-x-2">
                                    <div class="w-6 h-6 rounded-full border-2 border-white bg-primary-fixed"></div>
                                    <div class="w-6 h-6 rounded-full border-2 border-white bg-secondary-fixed"></div>
                                </div>
                                <p class="text-label-sm font-label-sm text-on-surface-variant">2 users active</p>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Content Column -->
                <div class="lg:col-span-5 space-y-6 text-center lg:text-left">
                    <div class="space-y-3">
                        <h1 class="font-display-lg-mobile lg:font-display-lg text-display-lg-mobile lg:text-display-lg text-on-surface leading-tight" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 40px; font-weight: 700;">
                            A Sanctuary for <span class="text-primary italic">Us.</span>
                        </h1>
                        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-sm mx-auto lg:mx-0" style="font-family: 'Inter', sans-serif; font-size: 18px; font-weight: 400;">
                            The intimate space to store memories, chat privately, and build your future together.
                        </p>
                    </div>
                    
                    <!-- Action Buttons -->
                    <div class="flex flex-col gap-3 max-w-sm mx-auto lg:mx-0">
                        <button class="accent-gradient w-full py-4 rounded-full font-headline-sm text-white shadow-[0_20px_40px_rgba(252,179,190,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group" id="welcome-register" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 600;">
                            Register →
                        </button>
                        <button class="w-full py-4 rounded-full border-2 border-secondary/20 font-headline-sm text-secondary glass-card hover:bg-white/60 active:scale-95 transition-all duration-300" id="welcome-login" style="font-family: 'Plus Jakarta Sans', sans-serif; font-size: 18px; font-weight: 600;">
                            Login
                        </button>
                    </div>
                    
                    <!-- Social Proof -->
                    <div class="flex items-center justify-center lg:justify-start gap-3">
                        <div class="flex -space-x-2">
                            <div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-high"></div>
                            <div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-highest"></div>
                            <div class="w-8 h-8 rounded-full border-2 border-white bg-surface-variant"></div>
                        </div>
                        <span class="text-label-sm font-label-sm text-on-surface-variant/70 uppercase tracking-widest" style="font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;">JOIN 50K+ COUPLES</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer - Fixed di bottom -->
        <footer class="py-4 px-4 border-t border-outline-variant/20 bg-white/30 backdrop-blur-sm">
            <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 text-label-sm text-on-surface-variant/60" style="font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500;">
                <span>© 2026 OurStory Inc.</span>
                <div class="flex gap-6">
                    <a class="hover:text-primary transition-colors" href="#">Privacy</a>
                    <a class="hover:text-primary transition-colors" href="#">Terms</a>
                </div>
            </div>
        </footer>
    </div>

    <!-- Heart Particles Background -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none" id="particle-container"></div>
    
    <script>
        // Navigation
        document.getElementById('welcome-register')?.addEventListener('click', () => {
            window.location.href = '../pages/register.html';
        });
        
        document.getElementById('welcome-login')?.addEventListener('click', () => {
            window.location.href = '../pages/login.html';
        });
        
        // Create heart particles
        const container = document.getElementById('particle-container');
        if (container) {
            const colors = ['#fcb3be', '#cebdff', '#cae6ff'];
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                const isHeart = Math.random() > 0.4;
                particle.className = 'heart-particle material-symbols-outlined';
                particle.textContent = isHeart ? 'favorite' : 'sparkle';
                const size = Math.random() * 16 + 8;
                const left = Math.random() * 100;
                const delay = Math.random() * 10;
                const duration = Math.random() * 5 + 7;
                const color = colors[Math.floor(Math.random() * colors.length)];
                particle.style.cssText = `
                    position: absolute;
                    pointer-events: none;
                    opacity: 0;
                    font-size: ${size}px;
                    left: ${left}%;
                    animation: rise ${duration}s linear ${delay}s infinite;
                    color: ${color};
                    font-variation-settings: 'FILL' ${isHeart ? 1 : 0};
                    z-index: 0;
                `;
                container.appendChild(particle);
            }
        }
    </script>
</body>
</html>
