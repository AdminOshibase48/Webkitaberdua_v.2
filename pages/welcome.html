<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Welcome - OurStory</title>
    <meta name="theme-color" content="#874e58">
    <link rel="manifest" href="/manifest.json">
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <link href="../assets/css/tailwind.css" rel="stylesheet">
    <link href="../assets/css/main.css" rel="stylesheet">
    
    <style>
        .accent-gradient {
            background: linear-gradient(135deg, #874e58 0%, #645495 50%, #316385 100%);
        }
        .floating {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .heart-particle {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            animation: rise 8s linear infinite;
        }
        @keyframes rise {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            20% { opacity: 0.6; }
            80% { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="min-h-screen bg-surface flex flex-col relative overflow-hidden">
            <!-- Background Particles -->
            <div class="fixed inset-0 z-0 pointer-events-none" id="particle-container"></div>
            
            <!-- Main Content -->
            <main class="relative z-10 flex-1 flex flex-col items-center justify-center px-4 py-8 md:py-12">
                <!-- Logo -->
                <div class="absolute top-6 left-1/2 -translate-x-1/2 flex items-center gap-2">
                    <div class="w-10 h-10 rounded-full accent-gradient flex items-center justify-center shadow-lg">
                        <span class="material-symbols-outlined text-white filled">favorite</span>
                    </div>
                    <span class="font-headline-md text-primary tracking-tight">OurStory</span>
                </div>
                
                <!-- Hero Section -->
                <div class="w-full max-w-5xl grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 items-center mt-12 lg:mt-0">
                    <!-- Left: Illustration -->
                    <div class="flex justify-center order-2 lg:order-1">
                        <div class="relative w-full max-w-sm lg:max-w-md">
                            <div class="absolute inset-0 bg-primary-container/20 blur-[100px] rounded-full"></div>
                            <div class="relative floating">
                                <div class="aspect-square rounded-2xl overflow-hidden shadow-[0_32px_64px_rgba(135,78,88,0.12)] border-[8px] border-white">
                                    <img class="w-full h-full object-cover" alt="Couple illustration" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCqqh8ay1b5zbNQ4x0RZRkfl1qXIyyBGrtqxwZycGZofQIjJR7hUYwOYgSp-zqjtwOCmKihn9OWp-DQOw0revU2LpIhzQTLoQCO3t05hKzD-0MlQcZ3emvnWbzIQRfyUn7t9XmB58KAkYHhckoyD04R_AGq-mJ_gryicqrKIcmmMzk6yiaND89drrKWzsBYMMvHZ47oHgWoffz-4hJSvCnSOeHIokcLsW9TjvyfRvv0EXUnRnJuIxoIvQEIUNylVsET_BBXA23ohF4" />
                                </div>
                                <!-- Floating Cards -->
                                <div class="absolute -top-4 -right-4 glass-card p-3 rounded-xl shadow-xl animate-bounce" style="animation-duration: 3s;">
                                    <div class="flex items-center gap-2">
                                        <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center">
                                            <span class="material-symbols-outlined text-on-secondary-container text-sm filled">auto_awesome</span>
                                        </div>
                                        <div>
                                            <p class="text-[10px] font-label-sm text-on-surface-variant">New Memory</p>
                                            <p class="text-xs font-bold text-secondary">Paris Trip '24</p>
                                        </div>
                                    </div>
                                </div>
                                <div class="absolute -bottom-4 -left-4 glass-card p-3 rounded-xl shadow-xl">
                                    <div class="flex items-center gap-2">
                                        <div class="flex -space-x-2">
                                            <div class="w-6 h-6 rounded-full border-2 border-white bg-primary-fixed"></div>
                                            <div class="w-6 h-6 rounded-full border-2 border-white bg-secondary-fixed"></div>
                                        </div>
                                        <p class="text-[10px] font-label-sm text-on-surface-variant">2 users active</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Right: Content -->
                    <div class="order-1 lg:order-2 text-center lg:text-left space-y-6 lg:space-y-8">
                        <div class="space-y-3">
                            <h1 class="font-display-lg-mobile lg:font-display-lg text-display-lg-mobile lg:text-display-lg text-on-surface leading-tight">
                                A Sanctuary for <span class="text-primary italic">Us.</span>
                            </h1>
                            <p class="font-body-lg text-on-surface-variant max-w-sm mx-auto lg:mx-0">
                                The intimate space to store memories, chat privately, and build your future together.
                            </p>
                        </div>
                        
                        <!-- Action Buttons -->
                        <div class="flex flex-col gap-3 max-w-sm mx-auto lg:mx-0">
                            <button class="accent-gradient w-full py-4 rounded-full font-headline-sm text-white shadow-[0_20px_40px_rgba(252,179,190,0.3)] hover:scale-[1.02] active:scale-95 transition-all duration-300 flex items-center justify-center gap-2 group" id="welcome-register">
                                Register →
                                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
                            </button>
                            <button class="w-full py-4 rounded-full border-2 border-secondary/20 font-headline-sm text-secondary glass-card hover:bg-white/60 active:scale-95 transition-all duration-300" id="welcome-login">
                                Login
                            </button>
                        </div>
                        
                        <!-- Social Proof -->
                        <div class="flex items-center justify-center lg:justify-start gap-3 pt-2">
                            <div class="flex -space-x-2">
                                <div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-high"></div>
                                <div class="w-8 h-8 rounded-full border-2 border-white bg-surface-container-highest"></div>
                                <div class="w-8 h-8 rounded-full border-2 border-white bg-surface-variant"></div>
                            </div>
                            <span class="text-[10px] font-label-sm text-on-surface-variant/70 uppercase tracking-widest">Join 50k+ Couples</span>
                        </div>
                    </div>
                </div>
            </main>
            
            <!-- Footer - Fixed di bawah -->
            <footer class="relative z-10 w-full px-4 py-4 border-t border-surface-variant/20">
                <div class="max-w-5xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-2 text-xs text-on-surface-variant/50">
                    <span>© 2026 OurStory Inc.</span>
                    <div class="flex gap-4">
                        <a class="hover:text-primary transition-colors" href="#">Privacy</a>
                        <a class="hover:text-primary transition-colors" href="#">Terms</a>
                    </div>
                </div>
            </footer>
        </div>
    </div>
    
    <script>
        // Konfigurasi Supabase
        const SUPABASE_URL = 'https://cyrptzbwxohzhqkjquen.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-6OEboAj0o1pZYG4si-o0Q_3xGfV5xr';
        
        // Register button
        document.getElementById('welcome-register')?.addEventListener('click', () => {
            window.location.href = '../pages/register.html';
        });
        
        // Login button
        document.getElementById('welcome-login')?.addEventListener('click', () => {
            window.location.href = '../pages/login.html';
        });
        
        // Create heart particles
        (function createParticles() {
            const container = document.getElementById('particle-container');
            if (!container) return;
            
            const colors = ['#fcb3be', '#cebdff', '#cae6ff'];
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                const isHeart = Math.random() > 0.4;
                particle.className = 'heart-particle material-symbols-outlined';
                particle.textContent = isHeart ? 'favorite' : 'sparkle';
                
                const size = Math.random() * 16 + 8;
                const left = Math.random() * 100;
                const delay = Math.random() * 10;
                const duration = Math.random() * 5 + 7;
                const color = colors[Math.floor(Math.random() * colors.length)];
                
                particle.style.cssText = `
                    font-size: ${size}px;
                    left: ${left}%;
                    animation-delay: ${delay}s;
                    animation-duration: ${duration}s;
                    color: ${color};
                    font-variation-settings: 'FILL' ${isHeart ? 1 : 0};
                `;
                container.appendChild(particle);
            }
        })();
    </script>
</body>
</html>
