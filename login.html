<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Our Story Together | Login</title>
    <meta name="theme-color" content="#FF6B9D">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/images/favicon-96x96.png" sizes="96x96">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FFF0F6 0%, #F3ECFF 100%);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Floating Hearts Container */
        .floating-hearts-login {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            color: #FF6B9D;
            opacity: 0.5;
            font-size: 1rem;
            animation: floatUp 5s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0.5);
                opacity: 0.6;
            }
            100% {
                transform: translateY(-20vh) scale(1.2);
                opacity: 0;
            }
        }

        /* Login Container */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 48px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
            text-align: center;
            border: 1px solid rgba(255, 107, 157, 0.2);
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-icon-wrapper {
            margin-bottom: 24px;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FF6B9D, #FFA8C8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.3);
        }

        .login-icon i {
            font-size: 2.5rem;
            color: white;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: #1F2937;
            margin-bottom: 8px;
        }

        .login-subtitle {
            color: #6B7280;
            margin-bottom: 32px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 0.875rem;
        }

        .input-group label i {
            margin-right: 6px;
            color: #FF6B9D;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #F3F4F6;
            border-radius: 16px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: white;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: #FF6B9D;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B9D, #FFA8C8);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(255, 107, 157, 0.4);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            margin-top: 24px;
            font-size: 0.75rem;
            color: #9CA3AF;
        }

        .error-message {
            background: #FEE2E2;
            color: #DC2626;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.875rem;
            display: none;
        }

        /* Loading overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 246, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            display: none;
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-spinner {
            text-align: center;
        }

        .loading-spinner i {
            font-size: 3rem;
            color: #FF6B9D;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="floating-hearts-login" id="floatingHeartsLogin"></div>

<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner">
        <i class="fas fa-heart"></i>
        <p style="margin-top: 16px; color: #FF6B9D;">Logging in...</p>
    </div>
</div>

<div class="login-container">
    <div class="login-card">
        <div class="login-icon-wrapper">
            <div class="login-icon">
                <i class="fas fa-heart"></i>
            </div>
        </div>
        <h1 class="login-title">Our Story Together</h1>
        <p class="login-subtitle">Our private love space</p>
        
        <div id="loginError" class="error-message"></div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock"></i> Password</label>
            <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
        </div>
        
        <button class="login-btn" id="loginBtn">
            <i class="fas fa-heart"></i>
            <span>Enter Our Love Space</span>
        </button>
        
        <p class="login-footer">Only for two hearts in love ❤️</p>
    </div>
</div>

<script>
    // ========================================
    // SUPABASE CONFIGURATION (Copy dari config.js)
    // GANTI DENGAN URL DAN KEY SUPABASE ANDA
    // ========================================
    const SUPABASE_URL = "https://lywxysvvblmaipcoqgoa.supabase.co";  // <-- GANTI INI
    const SUPABASE_ANON_KEY = "sb_publishable_x4DgVk7DLG_gjWK2iS3q2Q_ShRK3kAE";                // <-- GANTI INI
    
    // Initialize Supabase client (hanya sekali, dengan nama berbeda)
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    
    // DOM Elements
    const loginBtn = document.getElementById('loginBtn');
    const loginEmail = document.getElementById('loginEmail');
    const loginPassword = document.getElementById('loginPassword');
    const loginError = document.getElementById('loginError');
    const loadingOverlay = document.getElementById('loadingOverlay');
    
    // Create floating hearts animation
    function createFloatingHearts() {
        const container = document.getElementById('floatingHeartsLogin');
        if (!container) return;
        
        setInterval(() => {
            const heart = document.createElement('div');
            heart.className = 'floating-heart';
            heart.innerHTML = '<i class="fas fa-heart"></i>';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = 3 + Math.random() * 4 + 's';
            heart.style.animationDelay = Math.random() * 2 + 's';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 7000);
        }, 800);
    }
    
    // Show error message
    function showError(message) {
        loginError.textContent = message;
        loginError.style.display = 'block';
        setTimeout(() => {
            loginError.style.display = 'none';
        }, 3000);
    }
    
    // Hide error message
    function hideError() {
        loginError.style.display = 'none';
    }
    
    // Login function
    async function login() {
        const email = loginEmail.value.trim();
        const password = loginPassword.value.trim();
        
        // Validate inputs
        if (!email) {
            showError('Please enter your email ❤️');
            loginEmail.focus();
            return;
        }
        
        if (!password) {
            showError('Please enter your password 🔒');
            loginPassword.focus();
            return;
        }
        
        // Show loading
        hideError();
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Logging in...</span>';
        loadingOverlay.classList.add('active');
        
        try {
            // Attempt login
            const { data, error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password
            });
            
            if (error) {
                console.error('Login error:', error);
                
                // Show user-friendly error message
                if (error.message.includes('Invalid login credentials')) {
                    showError('Wrong email or password. Try again love! 💕');
                } else if (error.message.includes('Email not confirmed')) {
                    showError('Please confirm your email first. Check your inbox! 📧');
                } else {
                    showError(error.message || 'Login failed. Please try again.');
                }
                
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-heart"></i><span>Enter Our Love Space</span>';
                loadingOverlay.classList.remove('active');
                return;
            }
            
            // Login successful - update online status
            if (data.user) {
                try {
                    // Update user profile to online
                    const { error: updateError } = await supabaseClient
                        .from('profiles')
                        .update({ is_online: true, last_seen: new Date() })
                        .eq('user_id', data.user.id);
                    
                    if (updateError) {
                        console.warn('Could not update online status:', updateError);
                    }
                } catch (err) {
                    console.warn('Profile update error:', err);
                }
            }
            
            // Redirect to dashboard
            window.location.href = 'index.html';
            
        } catch (err) {
            console.error('Unexpected error:', err);
            showError('Connection error. Please check your internet connection.');
            loginBtn.disabled = false;
            loginBtn.innerHTML = '<i class="fas fa-heart"></i><span>Enter Our Love Space</span>';
            loadingOverlay.classList.remove('active');
        }
    }
    
    // Enter key handler
    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            event.preventDefault();
            login();
        }
    }
    
    // Setup event listeners
    function setupEventListeners() {
        loginBtn.addEventListener('click', login);
        loginPassword.addEventListener('keypress', handleKeyPress);
        loginEmail.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                loginPassword.focus();
            }
        });
    }
    
    // Check if already logged in
    async function checkExistingSession() {
        try {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                // Already logged in, redirect to dashboard
                window.location.href = 'index.html';
            }
        } catch (err) {
            console.log('No existing session');
        }
    }
    
    // Initialize page
    function init() {
        setupEventListeners();
        createFloatingHearts();
        checkExistingSession();
        
        // Auto-focus on email input
        setTimeout(() => {
            loginEmail.focus();
        }, 500);
    }
    
    // Start the app
    init();
</script>
</body>
</html>
